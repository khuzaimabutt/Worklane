name: Supabase keepalive

# Hits the keepalive endpoint on a schedule, in addition to the Vercel cron,
# so Supabase free-tier never sees 7 consecutive days without DB activity.
# Independent of Vercel infrastructure — runs even if a Vercel deploy breaks.
#
# Schedule: every 3 days at 18:00 UTC (offset from the Vercel cron at 06:00 UTC
# to spread coverage across the day).

on:
  schedule:
    - cron: "0 18 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping keepalive endpoint
        env:
          URL: ${{ vars.KEEPALIVE_URL || 'https://worklane-theta.vercel.app/api/cron/keepalive' }}
        run: |
          set -euo pipefail
          echo "Hitting $URL"
          response=$(curl -fsS --max-time 30 "$URL")
          echo "$response"
          # Fail the workflow if the response indicates the DB is unreachable
          echo "$response" | grep -q '"ok":true' || { echo "Keepalive failed"; exit 1; }
